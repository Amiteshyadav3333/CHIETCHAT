services:
  - type: web
    name: chietchat
    env: python
    region: oregon
    rootDir: CheatChat
    buildCommand: ./render-build.sh
    startCommand: gunicorn --worker-class eventlet -w 1 --chdir backend wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: chietchat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAX_UPLOAD_BYTES
        value: "104857600"
